title: Credential Dumping or Brute Force
id: varys-003
description: Detects credential harvesting and brute force patterns
level: critical
tags:
  - attack.credential_access
  - attack.t1003
logsource:
  category: process_creation
detection:
  selection:
    CommandLine|contains:
      - "mimikatz"
      - "sekurlsa"
      - "hashdump"
      - "shadow"
      - "john"
      - "hydra"
      - "hashcat"
  condition: selection
