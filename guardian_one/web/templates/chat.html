<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guardian One — Chat</title>
<!-- PWA -->
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Guardian One">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<link rel="stylesheet" href="/static/tokens.css">
<style>
  body {
    font-family: var(--g1-font-mono);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Chat header (below topnav) */
  .chat-header {
    background: var(--g1-bg-surface);
    border-bottom: 1px solid var(--g1-border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .chat-header__left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .chat-header__title {
    font-size: 14px;
    font-weight: 600;
    color: var(--g1-text-primary);
  }

  .chat-header__subtitle {
    font-size: 11px;
    color: var(--g1-text-muted);
    margin-top: 2px;
  }

  /* Toggle */
  .toggle-area {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .toggle-label {
    font-size: 12px;
    color: var(--g1-text-muted);
  }

  .toggle-label.active {
    color: var(--g1-accent);
    font-weight: 600;
  }

  .toggle {
    position: relative;
    width: 48px;
    height: 26px;
    cursor: pointer;
  }

  .toggle input {
    opacity: 0;
    width: 0;
    height: 0;
    position: absolute;
  }

  .toggle-slider {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--g1-border);
    border-radius: 13px;
    transition: 0.3s;
  }

  .toggle-slider:before {
    content: "";
    position: absolute;
    height: 20px;
    width: 20px;
    left: 3px;
    bottom: 3px;
    background: var(--g1-text-muted);
    border-radius: 50%;
    transition: 0.3s;
  }

  .toggle input:checked + .toggle-slider {
    background: var(--g1-accent-dim);
  }

  .toggle input:checked + .toggle-slider:before {
    transform: translateX(22px);
    background: var(--g1-accent);
  }

  .toggle input:focus-visible + .toggle-slider {
    outline: 2px solid var(--g1-border-focus);
    outline-offset: 2px;
  }

  .mode-indicator {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 12px;
    font-weight: 600;
  }

  .mode-local {
    background: var(--g1-green-dim);
    color: var(--g1-green);
    border: 1px solid rgba(74, 222, 128, 0.20);
  }

  .mode-ai {
    background: var(--g1-violet-dim);
    color: var(--g1-purple);
    border: 1px solid rgba(124, 58, 237, 0.20);
  }

  /* Messages area */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .message {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: var(--g1-radius-lg);
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .message-user {
    align-self: flex-end;
    background: var(--g1-accent-dim);
    color: var(--g1-text-primary);
    border: 1px solid rgba(74, 158, 255, 0.15);
    border-bottom-right-radius: 4px;
  }

  .message-guardian {
    align-self: flex-start;
    background: var(--g1-bg-raised);
    color: var(--g1-text-primary);
    border: 1px solid var(--g1-border);
    border-bottom-left-radius: 4px;
  }

  .message-guardian.type-error {
    border-color: rgba(248, 113, 113, 0.25);
    background: var(--g1-red-dim);
  }

  .message-guardian.type-ai {
    border-color: rgba(124, 58, 237, 0.25);
    background: var(--g1-violet-dim);
  }

  .message-system {
    align-self: center;
    background: transparent;
    color: var(--g1-text-muted);
    font-size: 11px;
    text-align: center;
    padding: 4px;
  }

  .message-sender {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
    color: var(--g1-text-muted);
  }

  .message-user .message-sender { color: var(--g1-accent); }
  .message-guardian .message-sender { color: var(--g1-violet); }
  .message-guardian.type-ai .message-sender { color: var(--g1-purple); }

  /* Input area */
  .input-area {
    background: var(--g1-bg-surface);
    border-top: 1px solid var(--g1-border);
    padding: 16px 20px;
    display: flex;
    gap: 12px;
    flex-shrink: 0;
  }

  .input-area input {
    flex: 1;
    background: var(--g1-bg-input);
    border: 1px solid var(--g1-border);
    border-radius: var(--g1-radius-md);
    padding: 12px 16px;
    color: var(--g1-text-primary);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color var(--g1-ease);
  }

  .input-area input:focus {
    border-color: var(--g1-border-focus);
  }

  .input-area input::placeholder {
    color: var(--g1-text-muted);
  }

  .send-btn {
    background: var(--g1-gradient);
    border: none;
    border-radius: var(--g1-radius-md);
    padding: 12px 24px;
    color: #fff;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity var(--g1-ease);
  }

  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Typing indicator */
  .typing {
    display: none;
    align-self: flex-start;
    padding: 12px 16px;
    color: var(--g1-text-muted);
    font-size: 12px;
  }

  .typing.visible { display: block; }

  @keyframes blink {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
  }

  .typing span {
    animation: blink 1.4s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
</style>
</head>
<body>

<!-- Global Navigation -->
<nav class="g1-topnav" aria-label="Global navigation">
  <a href="/" class="g1-topnav__brand" aria-label="Guardian One home">
    <div class="g1-topnav__logo" aria-hidden="true">G1</div>
    <span class="g1-topnav__title">Guardian One</span>
  </a>
  <ul class="g1-topnav__links" role="menubar">
    <li role="none"><a role="menuitem" href="/" class="g1-topnav__link">Command Center</a></li>
    <li role="none"><a role="menuitem" href="/chat" class="g1-topnav__link" aria-current="page">Chat</a></li>
  </ul>
  <div class="g1-topnav__status">
    <div class="g1-topnav__pulse" aria-label="System online"></div>
    <span>Online</span>
  </div>
</nav>

<header class="chat-header">
  <div class="chat-header__left">
    <div>
      <div class="chat-header__title">Guardian Chat</div>
      <div class="chat-header__subtitle">Sovereign Coordinator</div>
    </div>
  </div>
  <div class="toggle-area">
    <span class="toggle-label active" id="label-local">LOCAL</span>
    <label class="toggle" aria-label="Toggle AI mode">
      <input type="checkbox" id="ai-toggle" aria-describedby="mode-badge">
      <span class="toggle-slider"></span>
    </label>
    <span class="toggle-label" id="label-ai">AI</span>
    <span class="mode-indicator mode-local" id="mode-badge" role="status">Deterministic</span>
  </div>
</header>

<div class="messages" id="messages" role="log" aria-live="polite" aria-label="Chat messages">
  <div class="message message-system">Guardian One online. Type 'help' for commands.</div>
</div>

<div class="typing" id="typing" aria-live="polite">
  Guardian is thinking<span>.</span><span>.</span><span>.</span>
</div>

<div class="input-area">
  <label for="input" class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">Message</label>
  <input type="text" id="input" placeholder="Talk to Guardian One..." autocomplete="off" autofocus>
  <button class="send-btn" id="send-btn" onclick="sendMessage()" aria-label="Send message">Send</button>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const typingEl = document.getElementById('typing');
const aiToggle = document.getElementById('ai-toggle');
const labelLocal = document.getElementById('label-local');
const labelAI = document.getElementById('label-ai');
const modeBadge = document.getElementById('mode-badge');
const sendBtn = document.getElementById('send-btn');

// Toggle handler
aiToggle.addEventListener('change', () => {
  const isAI = aiToggle.checked;
  labelLocal.classList.toggle('active', !isAI);
  labelAI.classList.toggle('active', isAI);
  modeBadge.textContent = isAI ? 'AI Engine' : 'Deterministic';
  modeBadge.className = 'mode-indicator ' + (isAI ? 'mode-ai' : 'mode-local');
  addSystemMessage(isAI
    ? 'AI mode ON \u2014 Guardian will think with Ollama/Anthropic for open questions.'
    : 'AI mode OFF \u2014 Guardian uses deterministic commands only.'
  );
});

// Enter to send
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function addMessage(text, type, sender) {
  const div = document.createElement('div');
  div.className = `message message-${type}` + (sender === 'guardian' && type !== 'user' ? ` type-${type}` : '');

  const senderDiv = document.createElement('div');
  senderDiv.className = 'message-sender';
  senderDiv.textContent = sender === 'user' ? 'Jeremy' : 'Guardian One';

  const bodyDiv = document.createElement('div');
  bodyDiv.textContent = text;

  div.appendChild(senderDiv);
  div.appendChild(bodyDiv);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addSystemMessage(text) {
  const div = document.createElement('div');
  div.className = 'message message-system';
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = '';
  addMessage(text, 'user', 'user');

  sendBtn.disabled = true;
  typingEl.classList.add('visible');

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: text,
        use_ai: aiToggle.checked,
      }),
    });
    const data = await resp.json();
    addMessage(data.response, data.type || 'guardian', 'guardian');
  } catch (err) {
    addMessage('Connection error: ' + err.message, 'error', 'guardian');
  } finally {
    sendBtn.disabled = false;
    typingEl.classList.remove('visible');
    inputEl.focus();
  }
}

// Boot message
fetch('/api/status')
  .then(r => r.json())
  .then(data => {
    const agents = data.agents.map(a => a.name).join(', ');
    addSystemMessage(`Agents online: ${agents}`);
  })
  .catch(() => {});
</script>

<!-- PWA Service Worker -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/static/sw.js')
      .then(reg => console.log('Guardian One SW registered:', reg.scope))
      .catch(err => console.warn('SW registration failed:', err));
  });
}
</script>
</body>
</html>
