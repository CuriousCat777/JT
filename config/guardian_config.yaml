# Guardian One — System Configuration
# ====================================
# Owner: Jeremy Paulo Salvino Tabernero
# Last updated: 2026-03-19

owner: "Jeremy Paulo Salvino Tabernero"
timezone: "America/Chicago"
daily_summary_hour: 7   # 7 AM local time
data_dir: "data"
log_dir: "logs"
phone: "6028100527"

# AI Engine — the sovereign brain
# Ollama runs locally on your machine (true data sovereignty)
# Anthropic Claude API is the cloud fallback (smarter but sends data out)
ai_engine:
  primary_provider: ollama            # "ollama" or "anthropic"
  fallback_provider: anthropic        # Falls back if primary is unavailable
  ollama_base_url: "http://localhost:11434"
  ollama_model: "llama3"              # Model pulled via: ollama pull llama3
  anthropic_model: "claude-sonnet-4-20250514"
  max_tokens: 2048
  temperature: 0.3                    # Low = more deterministic reasoning
  timeout_seconds: 60
  enable_memory: true                 # Per-agent conversation memory
  max_memory_messages: 50

notifications:
  email_enabled: true
  sms_enabled: true
  imessage_enabled: true       # iMessage via macOS Messages.app
  push_enabled: true           # Push notifications via webhook
  quiet_hours_start: "22:00"   # 10 PM — hold LOW/MEDIUM alerts
  quiet_hours_end: "07:00"     # 7 AM — flush held alerts
  daily_digest: true           # Send daily financial summary email
  bill_reminders: true         # Alert when bills are due/overdue
  budget_alerts: true          # Alert when budget is near/over limit
  transaction_flags: true      # Alert on suspicious transactions
  rate_limit:
    max_per_window: 3          # Max 3 notifications per rolling window
    window_hours: 2            # 2-hour rolling window
    bypass_critical: true      # CRITICAL notifications always get through

# External services & platforms
services:
  notion:
    enabled: true
    mode: write_only           # Never read from Notion for decisions
  google:
    calendar: true
    gmail: true
  zapier:
    enabled: true              # Workflow automation bridge
    use_case: "cross-service triggers and automation"
  cloud:
    provider: "cloud_vps"      # Cloud VPS for hosting
    hosting:
      jtmdai_com: true         # Live
      drjeremytabernero_org: false  # Down — needs redeployment

security:
  encryption_enabled: true
  require_2fa: true
  session_timeout_minutes: 30
  max_failed_auth_attempts: 5
  audit_all_actions: true

# Security remediation tracking
# Mirrors the Notion "JTMDAI.com Security Remediation Tracker" database
security_remediation:
  enabled: true
  auto_verify: true           # Run automated checks on verifiable tasks
  notify_on_overdue: true     # Alert when tasks pass due date
  tracked_domains:
    - jtmdai.com
    - drjeremytabernero.org
  notion_tracker_id: "b990b46b336a446cbefe00541a5afb1a"
  # Notion Agents that consume remediation data:
  #   - Agency Operations Manager: monitors remediation progress
  #   - Calendar Optimizer: schedules review windows
  #   - Inbox Master: routes security alert emails
  #   - CRM Agent: tracks vendor security contacts
  #   - Inbox Organizer: categorizes security notifications

# Claude connector/MCP attack surface policy
connector_security:
  # Connectors required by Guardian One (keep connected)
  required_connectors:
    - cloudflare       # Both domains on Cloudflare
    - github           # Source code repository
    - gmail            # GmailAgent
    - google_calendar  # Chronos
    - n8n              # WebArchitect workflows
    - notion           # Write-only dashboard sync
    - webflow          # jtmdai.com CMS
    - zapier           # Cross-service automation bridge
  # Connectors to evaluate (may be needed, review scope)
  evaluate_connectors:
    - google_drive     # Potential Archivist use — restrict to readonly
    - figma            # Disconnect unless actively designing
  # DANGEROUS: disconnect when not in active supervised use
  dangerous_connectors:
    - desktop_commander_mcp   # Unrestricted shell execution
    - windows_mcp             # OS-level access, PowerShell, registry
    - aws_api_mcp             # Cloud resource control (scope to read-only)
    - filesystem_mcp          # Restrict to project dirs only
  # DISCONNECT: not needed, only adds attack surface
  disconnect_connectors:
    - aws_marketplace
    - biorxiv
    - canva
    - clinical_trials
    - cms_coverage
    - common_room
    - consensus
    - kiwi_com
    - lumin
    - npi_registry
    - spotify
    - weather

agents:
  chronos:
    enabled: true
    schedule_interval_minutes: 15
    allowed_resources:
      - calendar
      - sleep_data
      - routines
      - workflows
    custom:
      wake_alert_minutes_before: 30
      prechart_reminder: true

  archivist:
    enabled: true
    schedule_interval_minutes: 60
    allowed_resources:
      - file_index
      - data_sources
      - privacy_tools
      - master_profile
    custom:
      auto_encrypt_sensitive: true
      retention_check_daily: true

  cfo:
    enabled: true
    schedule_interval_minutes: 60
    allowed_resources:
      - accounts
      - transactions
      - bills
      - scenarios
    custom:
      primary_tracker: rocket_money   # Rocket Money is the primary finance tracker
      rocket_money_sync: true
      rocket_money_mode: api          # api or csv (csv via Gmail attachment)
      bill_alert_days_before: 3
      encrypt_financial_records: true

  doordash:
    enabled: true
    schedule_interval_minutes: 10
    allowed_resources:
      - orders
      - restaurants
      - meal_schedule
      - delivery_status
    custom:
      monthly_budget: 300
      default_tip_pct: 0.20
      coordinate_with_chronos: true
      coordinate_with_cfo: true

  web_architect:
    enabled: true
    schedule_interval_minutes: 30
    allowed_resources:
      - n8n_workflows
      - deployments
      - security_scans
      - uptime_records
    custom:
      domains:
        - drjeremytabernero.org
        - jtmdai.com
      enforce_security_headers: true
      ssl_required: true
      uptime_check_interval_minutes: 5
      coordinate_with_archivist: true
      coordinate_with_cfo: true
      sites:
        drjeremytabernero.org:
          label: "Dr. Jeremy Tabernero — Personal & Professional"
          site_type: professional
          status: down              # Currently offline — needs redeployment
          pages:
            - index.html
            - about.html
            - contact.html
            - cv.html
            - publications.html
          features:
            - contact_form
            - cv_download
            - publications_list
          hosting: cloud_vps
          notion_dashboard: true
        jtmdai.com:
          label: "JTMD AI — AI Solutions & Technology"
          site_type: business
          status: live              # Currently live and operational
          pages:
            - index.html
            - about.html
            - services.html
            - contact.html
            - case-studies.html
          features:
            - service_catalog
            - case_studies
            - contact_form
            - ai_demos
          hosting: cloud_vps
          notion_dashboard: true

  input_cortex:
    enabled: true
    schedule_interval_minutes: 5
    allowed_resources:
      - keystroke_stream
      - context_index
      - behavioral_digest
    custom:
      session_timeout_seconds: 300     # Flush session after 5 min idle
      min_words_to_store: 3            # Skip very short input
      daemon_mode: both                # listener + watcher
      listener_port: 9473              # HTTP endpoint for phone payloads
      phi_scrub_enabled: true          # Always scrub PHI/PII
      credential_redact: true          # Never store password entries
      daily_digest_hour: 23            # Generate digest at 11 PM
      retention_days: 90               # Keep processed sessions for 90 days

  device_agent:
    enabled: true
    schedule_interval_minutes: 15
    allowed_resources:
      - devices
      - network
      - smart_home
      - cameras
    custom:
      # Network security policy
      iot_vlan_required: true           # IoT devices MUST be on isolated VLAN
      block_iot_internet: true          # Block IoT devices from internet where possible
      firmware_check_daily: true        # Check for firmware updates daily
      unknown_device_alert: true        # Alert on new unknown devices
      # Smart home ecosystems
      ecosystems:
        tplink_kasa:
          enabled: true
          local_only: true              # Block cloud, use python-kasa local API
        philips_hue:
          enabled: true
          local_only: true              # Use bridge local API only
          bridge_ip: ""                 # Set after discovery
        govee:
          enabled: true
          prefer_lan: true              # Use LAN UDP API for newer models
        security_cameras:
          enabled: true
          local_nvr: true               # Store on local NVR, not cloud
          rtsp_encryption: true         # Require encrypted streams
        smart_tv:
          enabled: true
          acr_disabled: true            # Automatic Content Recognition off
          telemetry_blocked: true       # Block telemetry at router
        vehicle:
          enabled: true
          obd2_readonly: true           # OBD-II read-only mode
          remote_access: false          # Disable remote start/lock by default
        flipper_zero:
          enabled: true
          authorized_testing_only: true # Legal compliance reminder
