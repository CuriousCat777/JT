# Guardian One — System Configuration
# ====================================
# Owner: Jeremy Paulo Salvino Tabernero
# Last updated: 2026-03-16

owner: "Jeremy Paulo Salvino Tabernero"
timezone: "America/Chicago"
daily_summary_hour: 7   # 7 AM local time
data_dir: "data"
log_dir: "logs"
phone: "6028100527"

notifications:
  email_enabled: true
  sms_enabled: true
  imessage_enabled: true       # iMessage via macOS Messages.app
  push_enabled: true           # Push notifications via webhook
  quiet_hours_start: "22:00"   # 10 PM — hold LOW/MEDIUM alerts
  quiet_hours_end: "07:00"     # 7 AM — flush held alerts
  daily_digest: true           # Send daily financial summary email
  bill_reminders: true         # Alert when bills are due/overdue
  budget_alerts: true          # Alert when budget is near/over limit
  transaction_flags: true      # Alert on suspicious transactions
  rate_limit:
    max_per_window: 3          # Max 3 notifications per rolling window
    window_hours: 2            # 2-hour rolling window
    bypass_critical: true      # CRITICAL notifications always get through

# External services & platforms
services:
  notion:
    enabled: true
    mode: write_only           # Never read from Notion for decisions
  google:
    calendar: true
    gmail: true
  zapier:
    enabled: true              # Workflow automation bridge
    use_case: "cross-service triggers and automation"
  cloud:
    provider: "cloud_vps"      # Cloud VPS for hosting
    hosting:
      jtmdai_com: true         # Live
      drjeremytabernero_org: false  # Down — needs redeployment

security:
  encryption_enabled: true
  require_2fa: true
  session_timeout_minutes: 30
  max_failed_auth_attempts: 5
  audit_all_actions: true

agents:
  chronos:
    enabled: true
    schedule_interval_minutes: 15
    allowed_resources:
      - calendar
      - sleep_data
      - routines
      - workflows
    custom:
      wake_alert_minutes_before: 30
      prechart_reminder: true

  archivist:
    enabled: true
    schedule_interval_minutes: 60
    allowed_resources:
      - file_index
      - data_sources
      - privacy_tools
      - master_profile
    custom:
      auto_encrypt_sensitive: true
      retention_check_daily: true

  cfo:
    enabled: true
    schedule_interval_minutes: 60
    allowed_resources:
      - accounts
      - transactions
      - bills
      - scenarios
    custom:
      primary_tracker: rocket_money   # Rocket Money is the primary finance tracker
      rocket_money_sync: true
      rocket_money_mode: api          # api or csv (csv via Gmail attachment)
      bill_alert_days_before: 3
      encrypt_financial_records: true

  doordash:
    enabled: true
    schedule_interval_minutes: 10
    allowed_resources:
      - orders
      - restaurants
      - meal_schedule
      - delivery_status
    custom:
      monthly_budget: 300
      default_tip_pct: 0.20
      coordinate_with_chronos: true
      coordinate_with_cfo: true

  web_architect:
    enabled: true
    schedule_interval_minutes: 30
    allowed_resources:
      - n8n_workflows
      - deployments
      - security_scans
      - uptime_records
    custom:
      domains:
        - drjeremytabernero.org
        - jtmdai.com
      enforce_security_headers: true
      ssl_required: true
      uptime_check_interval_minutes: 5
      coordinate_with_archivist: true
      coordinate_with_cfo: true
      sites:
        drjeremytabernero.org:
          label: "Dr. Jeremy Tabernero — Personal & Professional"
          site_type: professional
          status: down              # Currently offline — needs redeployment
          pages:
            - index.html
            - about.html
            - contact.html
            - cv.html
            - publications.html
          features:
            - contact_form
            - cv_download
            - publications_list
          hosting: cloud_vps
          notion_dashboard: true
        jtmdai.com:
          label: "JTMD AI — AI Solutions & Technology"
          site_type: business
          status: live              # Currently live and operational
          pages:
            - index.html
            - about.html
            - services.html
            - contact.html
            - case-studies.html
          features:
            - service_catalog
            - case_studies
            - contact_form
            - ai_demos
          hosting: cloud_vps
          notion_dashboard: true
