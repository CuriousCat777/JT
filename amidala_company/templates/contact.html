{% extends "base.html" %}
{% block title %}Contact — Amidala{% endblock %}
{% block content %}
<h1>Contact Us</h1>
<form method="post" action="/contact">
    <label>Name <input type="text" name="name" required></label>
    <label>Email <input type="email" name="email" required></label>
    <label>Organization <input type="text" name="organization"></label>
    <label>Message <textarea name="message" rows="5"></textarea></label>
    <label>
        <input type="checkbox" name="cv_requested" value="yes" checked>
        Request CV
    </label>
    <button type="submit">Send</button>
</form>
{% endblock %}
