name: Compose Profiles Test

on:
  push:
    paths:
      - 'docker-compose*.yml'
  pull_request:
    paths:
      - 'docker-compose*.yml'

jobs:
  test-profiles:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        profile:
          - default
          - monitoring
          - debug
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Check if compose file exists
        id: check
        run: |
          if [ -f "docker-compose.yml" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No docker-compose.yml found, skipping"
          fi

      - name: Test profile '${{ matrix.profile }}'
        if: steps.check.outputs.exists == 'true'
        run: |
          if [ "${{ matrix.profile }}" = "default" ]; then
            docker compose config --quiet
            echo "Default profile valid"
          else
            # Check if profile is defined; skip if not, fail if config is invalid
            if docker compose --profile ${{ matrix.profile }} config --services 2>/dev/null | grep -q .; then
              docker compose --profile ${{ matrix.profile }} config --quiet
              echo "Profile '${{ matrix.profile }}' valid"
            else
              echo "Profile '${{ matrix.profile }}' has no services, skipping"
            fi
          fi
