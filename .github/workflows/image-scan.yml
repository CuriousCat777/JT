name: Image Scan

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/n8n-travel-intelligence

jobs:
  scan-latest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull latest image
        id: pull
        run: |
          if docker pull ${{ env.IMAGE_NAME }}:latest; then
            echo "pulled=true" >> $GITHUB_OUTPUT
          else
            echo "Image not found, skipping scan"
            echo "pulled=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Trivy vulnerability scan
        if: steps.pull.outputs.pulled == 'true'
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH
          output: trivy-report.txt

      - name: Check for critical vulnerabilities
        if: steps.pull.outputs.pulled == 'true'
        run: |
          if grep -q "CRITICAL" trivy-report.txt 2>/dev/null; then
            echo "Critical vulnerabilities found"
            cat trivy-report.txt
            curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
              -H 'Content-type: application/json' \
              -d '{"text":":shield: *Critical vulnerabilities detected* in latest Docker image. Review the Image Scan workflow run."}' \
              2>/dev/null || true
          else
            echo "No critical vulnerabilities found"
          fi

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.txt
          if-no-files-found: ignore
          retention-days: 30
