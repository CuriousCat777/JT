name: Backup

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger database backup
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_DEPLOY_HOST }}
          username: ${{ secrets.PROD_DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.PROD_DEPLOY_PORT }}
          script: |
            cd ${{ secrets.PROD_DEPLOY_PATH }}

            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            BACKUP_DIR="backups/${TIMESTAMP}"
            mkdir -p "${BACKUP_DIR}"

            # Backup postgres database
            docker compose exec -T postgres pg_dump -U n8n -Fc n8n > "${BACKUP_DIR}/n8n_db.dump"

            # Backup n8n data volume with explicit name and guard
            N8N_DATA_VOLUME="n8n_data"
            N8N_VOLUME_MATCHES=$(docker volume ls --format '{{.Name}}' | grep -Fx "${N8N_DATA_VOLUME}" || true)
            N8N_VOLUME_COUNT=$(printf '%s\n' "${N8N_VOLUME_MATCHES}" | grep -c . || true)

            if [ "${N8N_VOLUME_COUNT}" -ne 1 ]; then
              echo "Expected exactly one Docker volume named '${N8N_DATA_VOLUME}', found ${N8N_VOLUME_COUNT}."
              exit 1
            fi

            docker run --rm \
              -v "${N8N_DATA_VOLUME}:/data:ro" \
              -v "$(pwd)/${BACKUP_DIR}":/backup \
              alpine tar czf /backup/n8n_data.tar.gz -C /data .

            echo "Backup completed: ${BACKUP_DIR}"

            # Cleanup backups older than 30 days
            find backups/ -maxdepth 1 -type d -mtime +30 -exec rm -rf {} + 2>/dev/null || true
            echo "Old backups cleaned up"

      - name: Notify on failure
        if: failure()
        continue-on-error: true
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            -d '{"text":":warning: *Backup Failed* - Daily database backup did not complete successfully."}' \
            2>/dev/null || true
