name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cffi
          pip install -e ".[dev]"

      - name: Run tests
        id: test
        env:
          GUARDIAN_MASTER_PASSPHRASE: test-passphrase-for-ci
        continue-on-error: true
        run: |
          python -m pytest tests/ --tb=short -q 2>&1 > /tmp/test-output.txt
          cat /tmp/test-output.txt

      - name: Post test results
        if: always()
        run: |
          echo '## Test Results (Python ${{ matrix.python-version }})' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -80 /tmp/test-output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Fail if tests failed
        if: steps.test.outcome == 'failure'
        run: exit 1
