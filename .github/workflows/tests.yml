name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        id: install
        continue-on-error: true
        run: |
          python -m pip install --upgrade pip 2>&1 | tee /tmp/install-output.txt
          pip install cffi 2>&1 | tee -a /tmp/install-output.txt
          pip install -e ".[dev]" 2>&1 | tee -a /tmp/install-output.txt
          echo "INSTALL_OK=true" >> "$GITHUB_OUTPUT"

      - name: Run tests
        id: test
        if: steps.install.outcome == 'success'
        env:
          GUARDIAN_MASTER_PASSPHRASE: test-passphrase-for-ci
        continue-on-error: true
        run: |
          python -m pytest tests/ --tb=short -q 2>&1 | tee /tmp/test-output.txt
          exit ${PIPESTATUS[0]}

      - name: Post results as PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let installOutput = '';
            let testOutput = '';
            try { installOutput = fs.readFileSync('/tmp/install-output.txt', 'utf8'); } catch(e) { installOutput = 'No install output'; }
            try { testOutput = fs.readFileSync('/tmp/test-output.txt', 'utf8'); } catch(e) { testOutput = 'No test output (tests may not have run)'; }
            const installLines = installOutput.split('\n').slice(-50).join('\n');
            const testLines = testOutput.split('\n').slice(-150).join('\n');
            const body = [
              `## CI Debug (Python ${{ matrix.python-version }})`,
              ``,
              `**Install outcome:** \`${{ steps.install.outcome }}\``,
              `**Test outcome:** \`${{ steps.test.outcome }}\``,
              ``,
              `### Install output (last 50 lines)`,
              '```',
              installLines,
              '```',
              ``,
              `### Test output (last 150 lines)`,
              '```',
              testLines,
              '```',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });

      - name: Fail if anything failed
        if: steps.install.outcome == 'failure' || steps.test.outcome == 'failure'
        run: exit 1
