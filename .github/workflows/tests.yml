name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cffi
          pip install -e ".[dev]"

      - name: Verify key imports
        run: |
          python -c "from cryptography.fernet import Fernet; print('cryptography OK')"
          python -c "import flask; print('flask OK')"
          python -c "import httpx; print('httpx OK')"
          python -c "import openpyxl; print('openpyxl OK')"
          python -c "from guardian_one.core.audit import AuditLog; print('audit OK')"
          python -c "from guardian_one.core.guardian import GuardianOne; print('guardian OK')"

      - name: Run tests with coverage
        env:
          GUARDIAN_MASTER_PASSPHRASE: test-passphrase-for-ci
        run: |
          pytest tests/ -v --tb=long --cov=guardian_one --cov-report=term-missing --cov-fail-under=65
