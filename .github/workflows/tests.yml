name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cffi
          pip install -e ".[dev]"

      - name: Run tests
        id: test
        env:
          GUARDIAN_MASTER_PASSPHRASE: test-passphrase-for-ci
        continue-on-error: true
        run: |
          set -o pipefail
          python -m pytest tests/ --tb=short -q 2>&1 | tee /tmp/test-output.txt

      - name: Post test results as PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let output = 'No test output captured';
            try {
              output = fs.readFileSync('/tmp/test-output.txt', 'utf8');
            } catch(e) {
              output = 'Failed to read test output: ' + e.message;
            }
            // Truncate to last 200 lines to stay under comment limits
            const lines = output.split('\n');
            const tail = lines.slice(-200).join('\n');
            const body = `## Test Results (Python ${{ matrix.python-version }})\n\n\`\`\`\n${tail}\n\`\`\`\n\nOutcome: \`${{ steps.test.outcome }}\``;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });

      - name: Fail if tests failed
        if: steps.test.outcome == 'failure'
        run: exit 1
