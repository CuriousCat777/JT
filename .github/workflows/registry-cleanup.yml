name: Registry Cleanup

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/n8n-travel-intelligence

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: List and prune old tags
        run: |
          echo "Fetching tags for ${{ env.IMAGE_NAME }}..."

          # Get all tags via Docker Hub API
          TOKEN=$(curl -s "https://hub.docker.com/v2/users/login/" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${{ secrets.DOCKER_USERNAME }}\",\"password\":\"${{ secrets.DOCKER_PASSWORD }}\"}" \
            | jq -r '.token')

          TAGS=$(curl -s "https://hub.docker.com/v2/repositories/${{ env.IMAGE_NAME }}/tags/?page_size=100" \
            -H "Authorization: JWT ${TOKEN}" \
            | jq -r '.results[] | select(.name != "latest" and .name != "main") | select(now - (.last_updated | fromdateiso8601) > 2592000) | .name')

          if [ -z "$TAGS" ]; then
            echo "No old tags to clean up"
            exit 0
          fi

          echo "Tags older than 30 days:"
          echo "$TAGS"

          for TAG in $TAGS; do
            echo "Deleting tag: $TAG"
            curl -s -X DELETE \
              "https://hub.docker.com/v2/repositories/${{ env.IMAGE_NAME }}/tags/${TAG}/" \
              -H "Authorization: JWT ${TOKEN}" || true
          done

          echo "Registry cleanup complete"
