# Guardian One API — Database Configuration
#
# Development: SQLite (local, zero-config)
# Staging:     Railway PostgreSQL (via DATABASE_URL)
# Production:  Supabase PostgreSQL (via DATABASE_URL)

default: &default
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  adapter: sqlite3
  database: db/development.sqlite3

test:
  <<: *default
  adapter: sqlite3
  database: db/test.sqlite3

staging:
  <<: *default
  adapter: postgresql
  encoding: unicode
  url: <%= ENV["DATABASE_URL"] %>

production:
  <<: *default
  adapter: postgresql
  encoding: unicode
  url: <%= ENV["DATABASE_URL"] %>
