# Guardian One — Docker Compose
# ================================
# Three kinds of services live here:
#
#   guardian (default) — CLI-only DB access. One-shot by design: each
#     command (--db, --db-init, --db-logs, --db-accounts, …) prints
#     output and exits. Invoked on demand via `docker compose run`,
#     not `docker compose up`. No restart policy, no default command.
#
#   db-init (profile: setup) — one-shot helper for first-time DB
#     initialization from existing audit.jsonl + cfo_ledger.json.
#
#   sync / scheduler / devpanel (profiles: full, web) — genuinely
#     long-running services backed by the full Guardian One agent
#     runtime. These keep `restart: unless-stopped`.
#
# Usage:
#   docker compose run --rm guardian --db-init         # first run
#   docker compose run --rm guardian --db              # status
#   docker compose run --rm guardian --db-logs cfo     # filtered logs
#   docker compose run --rm guardian --db-accounts
#   docker compose --profile setup up db-init          # bootstrap
#   docker compose --profile full up -d                # sync + scheduler
#   docker compose --profile web up -d devpanel        # Flask panel
#
# Data persists across container restarts via named volumes.

services:
  guardian:
    build: .
    # No container_name (conflicts with `docker compose run`).
    # No restart policy and no default command: this container is
    # invoked on demand via `docker compose run --rm guardian <args>`,
    # runs a single CLI command, and exits cleanly.
    env_file:
      - .env
    environment:
      - GUARDIAN_DATA_DIR=/app/data
      - GUARDIAN_LOG_DIR=/app/logs
      - TZ=America/Chicago
    volumes:
      # Persistent storage — survives container rebuilds
      - guardian-data:/app/data          # SQLite database + CFO ledger
      - guardian-logs:/app/logs          # Audit logs (JSONL)
      - guardian-config:/app/config      # Config files, tokens, credentials

  # One-shot service to initialize the database on first deploy
  db-init:
    build: .
    container_name: guardian-db-init
    env_file:
      - .env
    environment:
      - GUARDIAN_DATA_DIR=/app/data
      - GUARDIAN_LOG_DIR=/app/logs
    volumes:
      - guardian-data:/app/data
      - guardian-logs:/app/logs
    command: ["--db-init"]
    profiles:
      - setup

  # Scheduled sync service — genuinely long-running: --sync loops forever
  sync:
    build: .
    container_name: guardian-sync
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - GUARDIAN_DATA_DIR=/app/data
      - GUARDIAN_LOG_DIR=/app/logs
      - TZ=America/Chicago
    volumes:
      - guardian-data:/app/data
      - guardian-logs:/app/logs
      - guardian-config:/app/config
    command: ["--sync"]
    # Non-mutating healthcheck: only verifies the DB file is reachable
    # read-only; it does not create or initialize the schema.
    healthcheck:
      test: ["CMD", "python", "-c", "import os, sqlite3, sys; p = os.path.join(os.environ.get('GUARDIAN_DATA_DIR', 'data'), 'guardian.db'); sys.exit(1) if not os.path.exists(p) else sqlite3.connect(f'file:{p}?mode=ro', uri=True).execute('SELECT 1').fetchone()"]
      interval: 60s
      timeout: 10s
      retries: 3
    profiles:
      - full

  # Scheduled agent runner — genuinely long-running: --schedule loops forever
  scheduler:
    build: .
    container_name: guardian-scheduler
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - GUARDIAN_DATA_DIR=/app/data
      - GUARDIAN_LOG_DIR=/app/logs
      - TZ=America/Chicago
    volumes:
      - guardian-data:/app/data
      - guardian-logs:/app/logs
      - guardian-config:/app/config
    command: ["--schedule"]
    healthcheck:
      test: ["CMD", "python", "-c", "import os, sqlite3, sys; p = os.path.join(os.environ.get('GUARDIAN_DATA_DIR', 'data'), 'guardian.db'); sys.exit(1) if not os.path.exists(p) else sqlite3.connect(f'file:{p}?mode=ro', uri=True).execute('SELECT 1').fetchone()"]
      interval: 60s
      timeout: 10s
      retries: 3
    profiles:
      - full

  # Web dev panel — genuinely long-running: Flask HTTP server
  devpanel:
    build: .
    container_name: guardian-devpanel
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - GUARDIAN_DATA_DIR=/app/data
      - GUARDIAN_LOG_DIR=/app/logs
      - TZ=America/Chicago
    volumes:
      - guardian-data:/app/data
      - guardian-logs:/app/logs
      - guardian-config:/app/config
    ports:
      - "5100:5100"
    command: ["--devpanel", "--devpanel-port", "5100"]
    healthcheck:
      test: ["CMD", "python", "-c", "import os, sqlite3, sys; p = os.path.join(os.environ.get('GUARDIAN_DATA_DIR', 'data'), 'guardian.db'); sys.exit(1) if not os.path.exists(p) else sqlite3.connect(f'file:{p}?mode=ro', uri=True).execute('SELECT 1').fetchone()"]
      interval: 60s
      timeout: 10s
      retries: 3
    profiles:
      - web

volumes:
  guardian-data:
    driver: local
  guardian-logs:
    driver: local
  guardian-config:
    driver: local
