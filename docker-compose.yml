version: "3.9"

services:
  guardian:
    build: .
    container_name: guardian-one
    restart: unless-stopped
    ports:
      - "5000:5000"   # Web dashboard
      - "8080:8080"   # Health API (daemon mode)
    volumes:
      - ./data:/app/data           # Persistent state
      - ./logs:/app/logs           # Audit + telemetry logs
      - ./config:/app/config       # Configuration
    env_file:
      - .env
    environment:
      - GUARDIAN_MASTER_PASSPHRASE=${GUARDIAN_MASTER_PASSPHRASE}
    command: ["python", "main.py", "--daemon"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Optional: Ollama for local AI
  ollama:
    image: ollama/ollama:latest
    container_name: guardian-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Open WebUI — local ChatGPT-style interface backed by Ollama
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: guardian-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    volumes:
      - open_webui_data:/app/backend/data
      - ./data:/app/backend/knowledge/guardian  # Archivist data as RAG source
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_AUTH=true
      - ENABLE_RAG_WEB_SEARCH=false
      - RAG_EMBEDDING_ENGINE=ollama
      - RAG_EMBEDDING_MODEL=nomic-embed-text
      - ENABLE_RAG_LOCAL_WEB_FETCH=false
    depends_on:
      - ollama

  # Optional: Wazuh manager for VARYS
  # Uncomment when ready to deploy SIEM
  # wazuh:
  #   image: wazuh/wazuh-manager:4.7.0
  #   container_name: guardian-wazuh
  #   restart: unless-stopped
  #   ports:
  #     - "1514:1514/udp"
  #     - "1515:1515"
  #     - "55000:55000"
  #   volumes:
  #     - wazuh_data:/var/ossec/data

volumes:
  ollama_data:
  open_webui_data:
  # wazuh_data:
